name: Code Formatting Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - '.prettierrc'
      - '.prettierignore'

jobs:
  prettier-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting with Prettier
        run: npm run format:check
        continue-on-error: false

      - name: Comment on PR if formatting fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Formato de código incorrecto**\n\n' +
                    'El código no cumple con los estándares de formato definidos en Prettier.\n\n' +
                    '**Reglas configuradas:**\n' +
                    '- Ancho de línea: 100 caracteres\n' +
                    '- Comillas simples\n' +
                    '- Comas finales en todas partes\n' +
                    '- Punto y coma obligatorio\n\n' +
                    '**Para corregir:**\n' +
                    '1. Ejecuta `npm run format` para formatear automáticamente\n' +
                    '2. Revisa y confirma los cambios\n' +
                    '3. Haz commit y push de los archivos corregidos\n\n' +
                    '```bash\n' +
                    'npm run format\n' +
                    'git add .\n' +
                    'git commit -m "fix: format code with Prettier"\n' +
                    'git push\n' +
                    '```'
            })
